<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>مركز التحكّم بالمستأجرين — جمانة سوفت</title>
  <link rel="stylesheet" href="/super-admin/super-admin.css" />
</head>
<body>
  <header class="sa-header">
    <div class="sa-brand"><span class="sa-logo">🛡️</span> جمانة سوفت — مركز التحكّم بالمستأجرين</div>
    <div class="sa-sub">Super Admin · Tenant Control Center</div>
  </header>

  <main class="sa-main">
    <section class="sa-toolbar">
      <input id="sa-search" class="sa-input" type="search" placeholder="بحث بالاسم أو النطاق الفرعي…" aria-label="بحث" />
      <select id="sa-status" class="sa-input" aria-label="تصفية بالحالة">
        <option value="">كل الحالات</option>
        <option value="active">نشط</option>
        <option value="trial">تجريبي</option>
        <option value="suspended">معلّق</option>
        <option value="cancelled">ملغى</option>
      </select>
      <input id="sa-plan" class="sa-input" type="text" placeholder="الخطة (مثل standard)" aria-label="تصفية بالخطة" />
      <button id="sa-refresh" class="sa-btn">تحديث</button>
    </section>

    <section id="sa-state" class="sa-state" hidden></section>

    <section class="sa-table-wrap">
      <table class="sa-table" id="sa-table">
        <thead>
          <tr>
            <th>#</th><th>المستأجر</th><th>النطاق الفرعي</th><th>الحالة</th><th>الخطة</th><th>أُنشئ</th><th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="sa-tbody"></tbody>
      </table>
    </section>

    <aside id="sa-detail" class="sa-detail" hidden aria-live="polite"></aside>
  </main>

  <script src="/super-admin/super-admin.js" defer></script>
</body>
</html>
