<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="5">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نما الطبي - Nama Medical ERP</title>
    <meta name="description" content="Nama Medical ERP - نظام نما الطبي لإدارة المستشفيات والعيادات">
    <link rel="stylesheet" href="/css/tailwind-compiled.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&amp;family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Flatpickr Datepicker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
</head>
<body class="text-on-surface antialiased bg-background">
    <div id="app">
        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header flex flex-col items-center gap-2">
                <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-secondary-fixed mb-1 border border-white/10">
                    <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
                </div>
                <h2 class="sidebar-title">نما الطبي</h2>
                <p class="sidebar-subtitle">Nama Medical ERP</p>
            </div>
            
            <!-- Navigation List -->
            <nav id="navList" class="flex-1 overflow-y-auto px-3 py-4 space-y-1"></nav>
            
            <!-- Sidebar Footer -->
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div>
                        <div class="user-name" id="userName">Admin</div>
                        <div class="user-role" id="userRole">مدير</div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn" title="تسجيل الخروج">⏻</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="mainContent">
            <!-- Topbar Header -->
            <header id="topHeader">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">☰</button>
                    <h1 class="header-title" id="headerTitle">لوحة التحكم</h1>
                </div>
                <div class="header-right">
                    <input type="text" class="search-box" id="globalSearch"
                        placeholder="بحث بالاسم، الهوية، الجوال، رقم الملف...">
                    
                    <button class="lang-toggle-btn" id="langToggleBtn" title="تغيير اللغة">🌐 EN</button>
                    
                    <select class="theme-select" id="themeSelect" title="اختر السمة">
                        <option value="0">🔵 أزرق داكن</option>
                        <option value="1">🟢 أخضر داكن</option>
                        <option value="2">🟣 بنفسجي</option>
                        <option value="3">🔴 أحمر</option>
                        <option value="4">🟡 ذهبي</option>
                        <option value="5" selected>⬜ فاتح كلاسيك</option>
                        <option value="6">🔷 فاتح أزرق</option>
                        <option value="7">🟩 فاتح أخضر</option>
                    </select>
                </div>
            </header>
            
            
            <!-- Dynamic Page Content -->
            <div id="pageContent" class="page-content bg-background"></div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/onboarding-wizard.js"></script>
</body>
</html>
