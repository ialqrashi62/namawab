name: Secret Scan

# Detects committed secrets (API keys, passwords, tokens) — directly addresses the historical
# secret-exposure incident. Complements the in-repo no_hardcoded_secrets_test.js.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so a re-introduced secret is caught

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
